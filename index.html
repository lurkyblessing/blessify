<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blessify - Aesthetic Picture Decorator</title>
    <meta name="description" content="Decorate your pictures with a dark, moody aesthetic, vintage fonts, and stickers.">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Blessify</h1>
            <p>make your pics aesthetic</p>
        </header>

        <main class="editor-workspace">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="mainCanvas"></canvas>
                <div class="upload-overlay" id="uploadOverlay">
                    <label for="imageUpload" class="upload-btn">Upload a Picture</label>
                    <input type="file" id="imageUpload" accept="image/png, image/jpeg, image/webp" hidden>
                    <p class="drag-text">or drag and drop here</p>
                </div>
                <!-- Interactive Elements Layer (divs over canvas for easy dragging, before rendering to canvas on save) -->
                <div id="interactiveLayer" class="interactive-layer hidden"></div>
            </div>

            <aside class="toolbar glass-panel">
                <div class="tool-section">
                    <h3>Filters</h3>
                    <button class="action-btn" id="btnBlessify">Blessify Filter 🖤</button>
                    <button class="action-btn secondary" id="btnResetFilter">Reset Filter</button>
                </div>

                <div class="tool-section">
                    <h3>Decorate</h3>
                    <button class="action-btn" id="btnAddText">Add Text 🔤</button>
                    <div class="sticker-palette" id="stickerPalette">
                        <!-- Stickers populated by JS -->
                    </div>
                </div>

                <div class="tool-section export-section">
                    <button class="action-btn primary" id="btnExport">Save Picture ✨</button>
                </div>
            </aside>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
